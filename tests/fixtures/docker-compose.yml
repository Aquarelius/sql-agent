services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sqlagent
      POSTGRES_USER: sqlagent
      POSTGRES_PASSWORD: sqlagent_pw
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlagent -d sqlagent"]
      interval: 5s
      timeout: 5s
      retries: 20

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SqlAgent_pw1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
