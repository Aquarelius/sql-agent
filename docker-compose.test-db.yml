services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-agent-test-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_AGENT_TEST_DB_PASSWORD:?Set SQL_AGENT_TEST_DB_PASSWORD}"
    ports:
      - "${SQL_AGENT_TEST_DB_PORT:-14333}:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SQL_AGENT_TEST_DB_PASSWORD: "${SQL_AGENT_TEST_DB_PASSWORD:?Set SQL_AGENT_TEST_DB_PASSWORD}"
      SQL_AGENT_TEST_DB_NAME: "${SQL_AGENT_TEST_DB_NAME:-SqlAgentTest}"
    volumes:
      - ./scripts/sqlserver:/docker-entrypoint-initdb.d:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${SQL_AGENT_TEST_DB_PASSWORD}\" -C -i /docker-entrypoint-initdb.d/create-test-db.sql -v DatabaseName=\"$${SQL_AGENT_TEST_DB_NAME}\""
    restart: "no"

